<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restaurant System — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Kalam:wght@400;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --accent: #3b5bdb;
    --accent-soft: color-mix(in oklab, var(--accent) 14%, #fff);
    --ink: #2b2b2f;
    --ink-soft: #6b6b73;
    --line: #2b2b2f;
    --paper: #f7f6f3;
    --panel: #ffffff;
    --alert: #c2410c;
    --ok: #2f7d4f;
    --hand: 'Patrick Hand', 'Comic Sans MS', cursive;
    --hand-bold: 'Kalam', cursive;
    --mono: 'Inconsolata', ui-monospace, monospace;
    --gap: 20px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family: var(--hand);
    color: var(--ink);
    background: var(--paper);
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
  }
  /* density */
  body[data-density="compact"]{ --gap: 12px; }

  /* ---------- App shell ---------- */
  .app{ display:grid; grid-template-columns: 248px 1fr; height:100vh; }
  @media (max-width: 820px){ .app{ grid-template-columns: 1fr; } }

  .side{
    background: var(--panel);
    border-right: 2px solid var(--line);
    padding: 20px 16px;
    display:flex; flex-direction:column; gap:6px;
    overflow:auto;
  }
  .brand{ display:flex; align-items:center; gap:10px; margin-bottom: 14px; padding: 2px 6px;}
  .brand .logo{
    width:34px; height:34px; border:2px solid var(--line); display:grid; place-items:center;
    font-family:var(--hand-bold); font-weight:700; background:var(--accent-soft);
  }
  .brand b{ font-family:var(--hand-bold); font-weight:700; font-size:19px; line-height:1; }
  .brand small{ display:block; color:var(--ink-soft); font-size:12.5px; font-family:var(--mono); }
  .nav-h{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); margin:14px 8px 4px; }
  .nav-i{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border:2px solid transparent;
    cursor:pointer; color:var(--ink); user-select:none; border-radius:6px;
  }
  .nav-i .ic{ width:22px; height:22px; border:2px solid var(--line); display:grid; place-items:center; font-size:13px; flex:0 0 auto; }
  .nav-i:hover{ background: #f0eee9; }
  .nav-i.active{ background: var(--accent-soft); border-color: var(--line); }
  .nav-i.active .ic{ background: var(--accent); color:#fff; border-color:var(--accent); }
  .side-foot{ margin-top:auto; font-family:var(--mono); font-size:11px; color:var(--ink-soft); padding:10px 8px; border-top:2px dashed #ccc; }

  /* ---------- Main ---------- */
  .main{ display:flex; flex-direction:column; overflow:hidden; }
  .topbar{
    display:flex; align-items:center; gap:16px; padding:16px 24px; border-bottom:2px solid var(--line);
    background: var(--panel); flex-wrap:wrap;
  }
  .topbar h1{ font-family:var(--hand-bold); font-weight:700; font-size:24px; margin:0; }
  .topbar .crumb{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); }
  .variants{ margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .variants .vl{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.1em; }
  .vtab{
    padding:7px 12px; border:2px solid var(--line); cursor:pointer; background:var(--panel);
    font-family:var(--hand); font-size:15px; line-height:1; white-space:nowrap;
  }
  .vtab:hover{ background:#f0eee9; }
  .vtab.active{ background: var(--accent); color:#fff; border-color:var(--accent); }
  .stage{ overflow:auto; padding: 28px; flex:1; }
  .stage-inner{ max-width: 1180px; margin: 0 auto; }
  .vcap{
    font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin: 0 0 18px;
    display:flex; gap:8px; align-items:baseline;
  }
  .vcap b{ font-family:var(--hand-bold); color:var(--accent); font-size:14px; }

  /* ---------- Wireframe primitives ---------- */
  .sk{ border:2px solid var(--line); background:var(--panel); }
  body[data-style="sketch"] .sk{
    border-radius: 255px 12px 225px 14px/14px 225px 14px 255px;
    box-shadow: 1.5px 2px 0 rgba(0,0,0,.06);
  }
  body[data-style="clean"]{ --hand: 'Inconsolata', monospace; --hand-bold:'Inconsolata',monospace; }
  body[data-style="clean"] .sk{ border-radius:8px; }
  body[data-style="clean"] .vtab,
  body[data-style="clean"] .nav-i,
  body[data-style="clean"] .nav-i .ic,
  body[data-style="clean"] .brand .logo{ border-radius:6px; }

  .card{ padding:18px; }
  .row{ display:flex; gap:var(--gap); }
  .col{ display:flex; flex-direction:column; gap:var(--gap); }
  .wrap{ flex-wrap:wrap; }
  .grow{ flex:1; }
  .between{ justify-content:space-between; }
  .center{ align-items:center; }

  .h{ font-family:var(--hand-bold); font-weight:700; margin:0; }
  .h-xl{ font-size:26px; } .h-lg{ font-size:21px; } .h-md{ font-size:18px; }
  .muted{ color:var(--ink-soft); }
  .mono{ font-family:var(--mono); }
  .small{ font-size:13px; }
  .tiny{ font-size:11.5px; font-family:var(--mono); color:var(--ink-soft); }

  .btn{
    display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border:2px solid var(--line);
    background:var(--panel); cursor:pointer; font-family:var(--hand); font-size:16px; line-height:1; white-space:nowrap;
  }
  body[data-style="sketch"] .btn{ border-radius: 120px 8px 110px 8px/8px 110px 8px 120px; }
  body[data-style="clean"] .btn{ border-radius:7px; }
  .btn.pri{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn.sm{ padding:6px 11px; font-size:14px; }
  .btn.gho{ background:transparent; border-style:dashed; }

  .field{ display:flex; flex-direction:column; gap:5px; }
  .field label{ font-family:var(--mono); font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .inp{
    border:2px solid var(--line); background:var(--panel); padding:9px 11px; min-height:38px;
    display:flex; align-items:center; color:var(--ink-soft); font-family:var(--hand); font-size:15px;
  }
  body[data-style="sketch"] .inp{ border-radius: 60px 8px 70px 8px/8px 70px 8px 60px; }
  body[data-style="clean"] .inp{ border-radius:6px; }
  .inp.area{ min-height:74px; align-items:flex-start; }

  .chip{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border:2px solid var(--line); font-size:13px; font-family:var(--hand); }
  body[data-style="sketch"] .chip{ border-radius:40px 10px 40px 10px/10px 40px 10px 40px; }
  body[data-style="clean"] .chip{ border-radius:20px; }
  .chip.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip.warn{ background:color-mix(in oklab, var(--alert) 14%, #fff); border-color:var(--alert); color:var(--alert); }
  .chip.ok{ background:color-mix(in oklab, var(--ok) 16%, #fff); border-color:var(--ok); color:var(--ok); }

  /* placeholder image (striped) */
  .ph{
    border:2px solid var(--line); display:grid; place-items:center; color:var(--ink-soft);
    background-image: repeating-linear-gradient(45deg, #ece9e2 0 10px, #f6f4ef 10px 20px);
    font-family:var(--mono); font-size:11px; text-align:center; padding:6px;
  }
  body[data-style="sketch"] .ph{ border-radius: 30px 8px 30px 8px/8px 30px 8px 30px; }

  /* annotation callout */
  .anno{
    font-family:var(--hand); color:var(--accent); font-size:14.5px; display:flex; gap:7px; align-items:flex-start;
    padding:7px 0;
  }
  .anno::before{ content:"✎"; font-size:14px; opacity:.8; }
  body[data-anno="off"] .anno{ display:none; }

  /* table */
  .tbl{ width:100%; border-collapse:collapse; font-size:15px; }
  .tbl th{ text-align:left; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); padding:10px 12px; border-bottom:2px solid var(--line); font-weight:400; }
  .tbl td{ padding:12px; border-bottom:1.5px dashed #d8d5cd; }
  .tbl tr:last-child td{ border-bottom:none; }
  .tbl .num{ font-family:var(--mono); text-align:right; }

  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; border:1.5px solid var(--line); }
  .dot.g{ background:var(--ok); border-color:var(--ok);} .dot.r{ background:var(--alert); border-color:var(--alert);} .dot.y{ background:#d4a017; border-color:#d4a017;}

  .grid{ display:grid; gap:var(--gap); }
  .divider{ height:2px; background:repeating-linear-gradient(90deg,var(--line) 0 8px, transparent 8px 14px); border:none; margin:4px 0; }

  /* phone frame */
  .phone{ width:300px; border:3px solid var(--line); border-radius:34px; padding:12px; background:var(--panel); flex:0 0 auto; }
  .phone .screen{ border:2px dashed #cfccc4; border-radius:22px; overflow:hidden; min-height:520px; display:flex; flex-direction:column; }
  .phone .notch{ width:80px; height:7px; background:var(--line); border-radius:6px; margin:2px auto 10px; }

  .sticker{ font-family:var(--hand-bold); font-size:13px; transform:rotate(-3deg); display:inline-block; padding:3px 9px; background:#fff3bf; border:2px solid var(--line); }
  body[data-style="clean"] .sticker{ transform:none; background:var(--accent-soft); }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#d3cfc6; border-radius:6px; }
</style>
</head>
<body data-style="sketch" data-density="comfy" data-anno="on">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="js/ui.jsx"></script>
  <script type="text/babel" src="js/screen-dashboard.jsx"></script>
  <script type="text/babel" src="js/screen-foods.jsx"></script>
  <script type="text/babel" src="js/screen-food-editor.jsx"></script>
  <script type="text/babel" src="js/screen-categories.jsx"></script>
  <script type="text/babel" src="js/screen-inventory.jsx"></script>
  <script type="text/babel" src="js/screen-guests.jsx"></script>
  <script type="text/babel" src="js/screen-factor.jsx"></script>
  <script type="text/babel" src="js/screen-menu.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
